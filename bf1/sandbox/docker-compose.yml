# BF1 CDC Sandbox
# MSSQL + Debezium: local Docker
# Kafka + Kafka UI: K8s cluster (of1-dev-kafka)
#
# Usage:
#   docker compose up -d
#   ./init-db.sh
#   ./register-connector.sh
#   ./test-crud.sh

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bf1-mssql
    ports: ["1433:1433"]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Bf1_Sandbox@2026"
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - mssql-data:/var/opt/mssql

  debezium-connect:
    image: debezium/connect:2.4
    container_name: bf1-debezium
    depends_on: [mssql]
    ports: ["8083:8083"]
    extra_hosts:
      - "server-01.of1-dev-kafka.svc:10.43.101.85"
      - "server-02.of1-dev-kafka.svc:10.43.180.91"
      - "server-03.of1-dev-kafka.svc:10.43.183.203"
    environment:
      BOOTSTRAP_SERVERS: server-01.of1-dev-kafka.svc:9092,server-02.of1-dev-kafka.svc:9092,server-03.of1-dev-kafka.svc:9092
      GROUP_ID: bf1-sandbox
      CONFIG_STORAGE_TOPIC: bf1_debezium_configs
      OFFSET_STORAGE_TOPIC: bf1_debezium_offsets
      STATUS_STORAGE_TOPIC: bf1_debezium_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 3
      OFFSET_STORAGE_REPLICATION_FACTOR: 3
      STATUS_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_PRODUCER_MAX_REQUEST_SIZE: 52428800
      CONNECT_PRODUCER_BUFFER_MEMORY: 104857600
      CONNECT_PRODUCER_COMPRESSION_TYPE: snappy

volumes:
  mssql-data:
